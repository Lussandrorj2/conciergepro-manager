{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Configurações — {{ hotel.nome }}</title>

    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-main:     #0b0f19;
            --bg-sidebar:  #0f1626;
            --bg-card:     #121a2b;
            --bg-hover:    #1a2438;
            --border:      #1f2a40;
            --border-light:#2a3754;
            --text-main:   #e6edf3;
            --text-muted:  #9fb0c7;
            --text-soft:   #6b7a90;
            --gold:        #c9a96e;
            --primary:     #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            height: 100vh;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            padding: 24px 16px;
            z-index: 1000;
        }

        .sidebar h2 {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-main);
            padding: 0 12px 28px;
        }

        nav {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }

        nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 16px;
            color: var(--text-muted);
            font-size: 13.5px;
            text-decoration: none;
            border-radius: 10px;
            transition: .2s;
        }

        nav a:hover { background: var(--bg-hover); color: var(--text-main); }
        nav a.active { background: rgba(201,169,110,.1); color: var(--gold); font-weight: 600; }

        /* MAIN */
        .main {
            margin-left: 240px;
            width: calc(100% - 240px);
        }

        .content {
            padding: 32px;
            max-width: 860px;
        }

        .page-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 28px;
            color: var(--text-main);
        }

        /* CARDS */
        .card {
            background: #1a2435;
            border: 1px solid #263348;
            border-radius: 14px;
            padding: 22px 24px;
            margin-bottom: 20px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .card h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
        }

        label {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 14px;
            display: block;
            font-weight: 500;
        }

        input[type="text"],
        input[type="file"] {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #2d3f58;
            background: #0f1a2e;
            color: var(--text-main);
            margin-top: 6px;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color .2s;
        }
        input[type="text"]:focus { border-color: var(--primary); }

        .banner-preview {
            height: 190px;
            border: 2px dashed #2d3f58;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            background: #0f1a2e;
            transition: border-color .2s;
            margin-top: 8px;
        }
        .banner-preview:hover { border-color: var(--primary); }

        .banner-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .banner-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-size: 13px;
        }
        .banner-placeholder svg { opacity: .5; }

        /* BOTÃO SALVAR */
        .btn-save {
            background: transparent;
            border: 1px solid #2d3f58;
            padding: 7px 16px;
            border-radius: 8px;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all .2s;
            font-family: 'Inter', sans-serif;
        }
        .btn-save:hover {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .btn-save:disabled {
            opacity: .5;
            cursor: not-allowed;
        }

        /* LOADING SPINNER inline */
        .btn-save.loading::after {
            content: '';
            display: inline-block;
            width: 10px;
            height: 10px;
            border: 2px solid rgba(255,255,255,.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .6s linear infinite;
            margin-left: 6px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* WHATSAPP field */
        .whatsapp-wrap {
            display: flex;
            gap: 6px;
            margin-top: 6px;
        }
        .whatsapp-prefix {
            background: #0f1a2e;
            border: 1px solid #2d3f58;
            padding: 10px 12px;
            border-radius: 8px;
            color: var(--text-muted);
            font-size: 13px;
            white-space: nowrap;
        }
        .whatsapp-wrap input { margin-top: 0; }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 11px 18px;
            border-radius: 9px;
            font-size: 13px;
            font-weight: 500;
            z-index: 9999;
            animation: slideUp .25s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,.4);
        }
        .toast.ok  { background: #059669; color: #fff; }
        .toast.err { background: #dc2626; color: #fff; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ERRO inline */
        .error-msg {
            font-size: 11px;
            color: #f87171;
            margin-top: 8px;
            padding: 8px 12px;
            background: rgba(239,68,68,.1);
            border: 1px solid rgba(239,68,68,.3);
            border-radius: 7px;
            display: none;
        }
        .error-msg.visible { display: block; }
    </style>
</head>

<body>
<div class="layout" style="display:flex;min-height:100vh;">

    <!-- SIDEBAR -->
    <aside class="sidebar">
            <h2>🔔 Concierge</h2>
            <nav>
                <a href="/{{ hotel.slug }}/dashboard/">🏠 Dashboard</a>
                <a href="/{{ hotel.slug }}/dashboard/criar/">➕ Criar Passeio</a>
                <a href="/{{ hotel.slug }}/dashboard/listar/">📋 Gerenciar</a>
                <a href="/{{ hotel.slug }}/dashboard/reservas/">📅 Reservas</a>
                <a href="/{{ hotel.slug }}/dashboard/cambio/">💱 Câmbio</a>
                <a href="/{{ hotel.slug }}/dashboard/relatorios/">📊 Relatórios</a>
                <a href="/{{ hotel.slug }}/dashboard/configuracoes/">⚙️ Config</a>
                <hr style="border-color:#1e293b;margin:12px 0;">
                <a href="/logout/">↩ Sair</a>
            </nav>
        </aside>

    <!-- MAIN -->
    <main class="main">
        <div class="content">

            <div class="page-title">⚙️ Configurações</div>

            <!-- ── APARÊNCIA ── -->
            <div class="card">
                <div class="card-header">
                    <h3>🎨 Aparência</h3>
                    <button class="btn-save" id="btn-salvar-hero" onclick="salvarHero()">
                        Salvar
                    </button>
                </div>

                <label>Banner da página do hotel</label>
                <div class="banner-preview" id="bannerBox">
                    <img id="previewBanner" style="display:none;" alt="Banner">
                    <div class="banner-placeholder" id="placeholder">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
                            <polyline points="21 15 16 10 5 21"/>
                        </svg>
                        <span>Clique para selecionar imagem</span>
                        <span style="font-size:11px;color:#475569;">JPG, PNG ou WebP</span>
                    </div>
                </div>
                <input type="file" id="bannerInput" accept="image/*" hidden>

                <div class="error-msg" id="hero-error"></div>

                <label>Título</label>
                <input type="text" id="titulo" placeholder="Ex: Hotel Ipanema Inn">

                <label>Subtítulo</label>
                <input type="text" id="subtitulo" placeholder="Ex: Sua experiência começa aqui">
            </div>

            <!-- ── CONTATO ── -->
            <div class="card">
                <div class="card-header">
                    <h3>📞 Contato</h3>
                    <button class="btn-save" id="btn-salvar-contato" onclick="salvarContato()">
                        Salvar
                    </button>
                </div>

                <label>WhatsApp</label>
                <div class="whatsapp-wrap">
                    <span class="whatsapp-prefix">+55</span>
                    <input type="text" id="whatsapp" placeholder="DDD + número (ex: 21999998888)">
                </div>
                <div class="error-msg" id="contato-error"></div>
            </div>

        </div>
    </main>

</div>

<script>
    const hotelSlug = "{{ hotel.slug }}";
    const csrfToken = "{{ csrf_token }}";

    // ── Preview do banner ──────────────────────────────────────────────
    const bannerBox   = document.getElementById("bannerBox");
    const bannerInput = document.getElementById("bannerInput");

    bannerBox.onclick = () => bannerInput.click();

    bannerInput.addEventListener("change", e => {
        const file = e.target.files[0];
        if (!file) return;
        const img = document.getElementById("previewBanner");
        img.src = URL.createObjectURL(file);
        img.style.display = "block";
        document.getElementById("placeholder").style.display = "none";
        document.getElementById("hero-error").classList.remove("visible");
    });

    // ── Carregar dados existentes ──────────────────────────────────────
    async function carregar() {
        try {
            const res  = await fetch(`/api/admin/${hotelSlug}/hero/get/`);
            if (!res.ok) return;
            const data = await res.json();

            document.getElementById("titulo").value    = data.titulo    || "";
            document.getElementById("subtitulo").value = data.subtitulo || "";

            if (data.banner) {
                const img = document.getElementById("previewBanner");
                img.src = data.banner;
                img.style.display = "block";
                document.getElementById("placeholder").style.display = "none";
            }

            if (data.whatsapp) {
                document.getElementById("whatsapp").value = data.whatsapp.replace(/^55/, "");
            }
        } catch(e) {
            console.warn("[carregar]", e);
        }
    }

    function compressImage(file, quality = 0.7, maxWidth = 1920) {
    return new Promise((resolve) => {
        const img = new Image();
        const reader = new FileReader();

        reader.readAsDataURL(file);
        reader.onload = (e) => img.src = e.target.result;

        img.onload = () => {
            const canvas = document.createElement("canvas");

            // evita aumentar imagem pequena
            const scale = Math.min(1, maxWidth / img.width);

            canvas.width = img.width * scale;
            canvas.height = img.height * scale;

            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            canvas.toBlob((blob) => {
                resolve(blob);
            }, "image/jpeg", quality);
        };
    });
}

    // ── Salvar aparência (hero) ────────────────────────────────────────
    async function salvarHero() {
        const btn = document.getElementById("btn-salvar-hero");
        const errEl = document.getElementById("hero-error");
        errEl.classList.remove("visible");

        btn.disabled = true;
        btn.classList.add("loading");
        btn.textContent = "Salvando";

        try {
            const form = new FormData();
            form.append("titulo",    document.getElementById("titulo").value);
            form.append("subtitulo", document.getElementById("subtitulo").value);

            const file = bannerInput.files[0];
            if (file) form.append("banner", file);

            const res = await fetch(`/api/admin/${hotelSlug}/hero/`, {
                method:  "POST",
                headers: { "X-CSRFToken": csrfToken },
                body:    form
            });

            if (!res.ok) {
                let msg = `Erro ${res.status}`;
                try {
                    const data = await res.json();
                    msg = data.erro || data.detail || data.error || msg;
                } catch {}
                errEl.textContent = "❌ " + msg;
                errEl.classList.add("visible");
                toast("❌ Erro ao salvar aparência", "err");
                return;
            }

            // Verifica se resposta tem campo de erro mesmo com status 200
            try {
                const data = await res.json();
                if (data.erro || data.error) {
                    errEl.textContent = "❌ " + (data.erro || data.error);
                    errEl.classList.add("visible");
                    toast("❌ " + (data.erro || data.error), "err");
                    return;
                }
            } catch {}

            toast("✔ Aparência salva com sucesso", "ok");

        } catch(e) {
            errEl.textContent = "❌ Erro de conexão: " + e.message;
            errEl.classList.add("visible");
            toast("❌ Erro de conexão", "err");
        } finally {
            btn.disabled = false;
            btn.classList.remove("loading");
            btn.textContent = "Salvar";
        }
    }

    // ── Salvar contato ─────────────────────────────────────────────────
    async function salvarContato() {
        const btn   = document.getElementById("btn-salvar-contato");
        const errEl = document.getElementById("contato-error");
        errEl.classList.remove("visible");

        btn.disabled = true;
        btn.classList.add("loading");
        btn.textContent = "Salvando";

        try {
            let numero = document.getElementById("whatsapp").value.replace(/\D/g, "");
            if (!numero.startsWith("55")) numero = "55" + numero;

            const form = new FormData();
            form.append("whatsapp", numero);

            const res = await fetch(`/api/admin/${hotelSlug}/hero/`, {
                method:  "POST",
                headers: { "X-CSRFToken": csrfToken },
                body:    form
            });

            if (!res.ok) {
                let msg = `Erro ${res.status}`;
                try {
                    const data = await res.json();
                    msg = data.erro || data.detail || data.error || msg;
                } catch {}
                errEl.textContent = "❌ " + msg;
                errEl.classList.add("visible");
                toast("❌ Erro ao salvar contato", "err");
                return;
            }

            toast("✔ Contato salvo com sucesso", "ok");

        } catch(e) {
            errEl.textContent = "❌ Erro de conexão: " + e.message;
            errEl.classList.add("visible");
            toast("❌ Erro de conexão", "err");
        } finally {
            btn.disabled = false;
            btn.classList.remove("loading");
            btn.textContent = "Salvar";
        }
    }

    // ── Toast ──────────────────────────────────────────────────────────
    function toast(msg, tipo = "ok") {
        const t = document.createElement("div");
        t.className = `toast ${tipo}`;
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    // Inicializar
    carregar();
</script>

</body>
</html>
