{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Passeio — {{ hotel.nome }}</title>
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        .form-card {
            background: #1e293b;
            border: 1px solid #263348;
            border-radius: 14px;
            padding: 28px;
            max-width: 700px;
        }

        .form-card h2 { font-size: 16px; margin-bottom: 24px; color: #e2e8f0; }

        label {
            display: block;
            font-size: 12px;
            color: #64748b;
            margin-bottom: 6px;
            margin-top: 16px;
            letter-spacing: .5px;
            text-transform: uppercase;
        }

        input[type=text], input[type=number], textarea, select {
            width: 100%;
            padding: 10px 14px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color .2s;
            box-sizing: border-box;
        }

        input:focus, textarea:focus, select:focus { border-color: #059669; }
        textarea { resize: vertical; min-height: 100px; }

        .switch-group { display: flex; gap: 20px; margin-top: 16px; flex-wrap: wrap; }

        .switch-row {
            display: flex; align-items: center; gap: 10px;
            background: #0f172a; border: 1px solid #334155;
            border-radius: 8px; padding: 10px 16px; cursor: pointer;
        }

        .switch-row span { font-size: 13px; color: #94a3b8; }

        input[type=checkbox] { accent-color: #059669; width: 16px; height: 16px; cursor: pointer; }

        .preview-galeria { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }

        .preview-galeria img {
            width: 80px; height: 80px; object-fit: cover;
            border-radius: 8px; border: 2px solid #334155;
        }

        .galeria-atual { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }

        .foto-item { position: relative; width: 80px; height: 80px; }

        .foto-item img {
            width: 100%; height: 100%; object-fit: cover;
            border-radius: 8px; border: 1px solid #334155;
        }

        .foto-del {
            position: absolute; top: -6px; right: -6px;
            background: #ef4444; color: white; border: none;
            border-radius: 50%; width: 20px; height: 20px;
            font-size: 11px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; line-height: 1;
        }

        #btn-salvar-passeio {
            margin-top: 24px;
            background: #059669; color: white; border: none;
            padding: 12px 28px; border-radius: 8px;
            font-size: 14px; font-weight: 600; cursor: pointer;
            font-family: 'Inter', sans-serif; transition: background .2s;
        }

        #btn-salvar-passeio:hover { background: #047857; }

        .toast {
            position: fixed; bottom: 20px; right: 20px;
            background: #059669; color: white;
            padding: 10px 18px; border-radius: 8px; font-size: 13px; z-index: 999;
        }

        .toast.error { background: #dc2626; }

        .upload-area {
            border: 2px dashed #334155; border-radius: 8px;
            padding: 20px; text-align: center; cursor: pointer;
            transition: border-color .2s; margin-top: 8px;
        }

        .upload-area:hover { border-color: #059669; }
        .upload-area p { color: #64748b; font-size: 13px; }
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <h2>🔔 Concierge</h2>
        <nav>
            <a href="/{{ hotel.slug }}/dashboard/">🏠 Dashboard</a>
            <a class="active">➕ Criar Passeio</a>
            <a href="/{{ hotel.slug }}/dashboard/listar/">📋 Gerenciar</a>
            <a href="/{{ hotel.slug }}/dashboard/reservas/">📅 Reservas</a>
            <a href="/{{ hotel.slug }}/dashboard/cambio/">💱 Câmbio</a>
            <a href="/{{ hotel.slug }}/dashboard/relatorios/">📊 Relatórios</a>
            <a href="/{{ hotel.slug }}/dashboard/configuracoes/">⚙️ Config</a>
            <hr style="border-color:#1e293b;margin:12px 0;">
            <a href="/logout/">↩ Sair</a>
        </nav>
    </aside>

    <main class="main">
        <header class="topbar">
            <h1 id="titulo-pagina">Novo Passeio</h1>
        </header>

        <div class="content">
            <div class="form-card">
                <h2>🧳 Dados do Passeio</h2>

                <label>Nome do passeio *</label>
                <input type="text" id="nome" placeholder="Ex: Passeio de barco em Angra dos Reis">

                <label>Descrição</label>
                <textarea id="descricao" placeholder="Descreva o passeio, o que está incluído, duração..."></textarea>

                <div class="switch-group">
                    <label class="switch-row" for="preco_sob_consulta">
                        <input type="checkbox" id="preco_sob_consulta">
                        <span>Sob consulta</span>
                    </label>
                    <label class="switch-row" for="preco_por_pessoa">
                        <input type="checkbox" id="preco_por_pessoa">
                        <span>Preço por pessoa</span>
                    </label>
                </div>

                <label>Preço (R$)</label>
                <input type="number" id="preco" placeholder="Ex: 150.00" step="0.01" min="0">

                <label>Imagens</label>
                <div class="upload-area" onclick="document.getElementById('fotos').click()">
                    <p>📷 Clique para adicionar fotos</p>
                    <p style="font-size:11px;margin-top:4px;">JPG, PNG, WEBP — múltiplas imagens</p>
                </div>
                <input type="file" id="fotos" multiple accept="image/*" style="display:none;">
                <div id="previewGaleria" class="preview-galeria"></div>

                <div id="galeria-existente" style="display:none;">
                    <label>Fotos existentes</label>
                    <div id="galeria-atual" class="galeria-atual"></div>
                </div>

                <button id="btn-salvar-passeio">🚀 Salvar Passeio</button>
            </div>
        </div>
    </main>
</div>

<script>
    window.hotelSlug = "{{ hotel.slug }}";
</script>
<script src="{% static 'js/dashboard.js' %}"></script>
</body>
</html>
