{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Passeio — {{ hotel.nome }}</title>
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="layout">

        <aside class="sidebar">
            <div class="sidebar-logo">🔔 Concierge</div>
            <nav>
                <a href="/{{ hotel.slug }}/dashboard/">🏠 Dashboard</a>
                <a href="/{{ hotel.slug }}/dashboard/criar/" class="active">➕ Criar Passeio</a>
                <a href="/{{ hotel.slug }}/dashboard/listar/">📋 Gerenciar</a>
                <a href="/{{ hotel.slug }}/dashboard/reservas/">📅 Reservas</a>
                <a href="/{{ hotel.slug }}/dashboard/cambio/">💱 Câmbio</a>
                <a href="/{{ hotel.slug }}/dashboard/relatorios/">📊 Relatórios</a>
                <a href="/{{ hotel.slug }}/dashboard/configuracoes/">⚙️ Config</a>
                <hr>
                <a href="/logout/">↩ Sair</a>
            </nav>
        </aside>

        <main class="main">
            <div class="topbar">
                <span class="topbar-title" id="titulo-pagina">Novo Passeio</span>
                <div class="hotel-badge">
                    <div class="hotel-dot"></div>
                    {{ hotel.nome }}
                </div>
            </div>

            <div class="content">
                <div class="form-card">
                    <h2>🧳 Dados do Passeio</h2>

                    <label for="nome">Nome do passeio *</label>
                    <input type="text" id="nome" placeholder="Ex: Passeio de barco em Angra dos Reis">

                    <label for="descricao">Descrição</label>
                    <textarea id="descricao" placeholder="Descreva o passeio, o que está incluído, duração..."></textarea>

                    <div class="switch-group">
                        <label class="switch-row" for="preco_sob_consulta">
                            <input type="checkbox" id="preco_sob_consulta">
                            <span>Sob consulta</span>
                        </label>
                        <label class="switch-row" for="preco_por_pessoa">
                            <input type="checkbox" id="preco_por_pessoa">
                            <span>Preço por pessoa</span>
                        </label>
                    </div>

                    <label for="preco">Preço (R$)</label>
                    <input type="number" id="preco" placeholder="Ex: 150.00" step="0.01" min="0">

                    <label>Imagens</label>
                    <div class="upload-area" onclick="document.getElementById('fotos').click()">
                        <p>📷 Clique para adicionar fotos</p>
                        <p>JPG, PNG, WEBP — múltiplas imagens</p>
                    </div>
                    <input type="file" id="fotos" multiple accept="image/*" hidden>
                    <div id="previewGaleria" class="preview-galeria"></div>

                    <div id="galeria-existente" hidden>
                        <label>Fotos existentes</label>
                        <div id="galeria-atual" class="galeria-atual"></div>
                    </div>

                    <button id="btn-salvar-passeio" class="btn-primary" style="margin-top:24px;padding:12px 28px;">
                        🚀 Salvar Passeio
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        window.hotelSlug = "{{ hotel.slug }}";
    </script>
    <script src="{% static 'js/criar_passeios.js' %}"></script>
</body>

</html>
