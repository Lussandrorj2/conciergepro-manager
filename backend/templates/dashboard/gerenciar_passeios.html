{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerenciar Passeios — {{ hotel.nome }}</title>
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        .content { padding: 28px; }

        /* Barra de topo do conteúdo */
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .content-header h2 {
            font-size: 15px;
            color: #e2e8f0;
            font-weight: 500;
        }

        .content-header span {
            font-size: 12px;
            color: #64748b;
        }

        .btn-novo {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #059669;
            color: white;
            border: none;
            padding: 9px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            transition: background .2s;
            cursor: pointer;
        }

        .btn-novo:hover { background: #047857; }

        /* Grid de cards */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .passeio-card {
            background: #1e293b;
            border: 1px solid #263348;
            border-radius: 14px;
            overflow: hidden;
            transition: border-color .2s;
        }

        .passeio-card:hover { border-color: #334155; }

        .card-img {
            width: 100%;
            height: 180px;
            background: #0f172a;
            overflow: hidden;
            position: relative;
        }

        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .sem-imagem {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #334155;
            font-size: 13px;
            flex-direction: column;
            gap: 8px;
        }

        .sem-imagem-icon { font-size: 28px; opacity: .4; }

        .preco-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #00000088;
            color: #34d399;
            font-size: 12px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
        }

        .card-body {
            padding: 16px;
        }

        .card-nome {
            font-size: 14px;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-desc {
            font-size: 12px;
            color: #64748b;
            line-height: 1.5;
            display: -webkit-box;
            
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 14px;
            min-height: 36px;
        }

        .card-tags {
            display: flex;
            gap: 6px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }

        .tag-pax { background: #1e3a5f33; color: #60a5fa; }
        .tag-consulta { background: #78350f33; color: #fbbf24; }
        .tag-foto { background: #064e3b33; color: #34d399; }
        .tag-sem-foto { background: #7f1d1d22; color: #f87171; }

        .card-acoes {
            display: flex;
            gap: 8px;
        }

        .btn-editar {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            color: #94a3b8;
            padding: 8px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all .15s;
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .btn-editar:hover {
            background: #1e3a5f;
            border-color: #3b82f6;
            color: #60a5fa;
        }

        .btn-excluir {
            background: #0f172a;
            border: 1px solid #334155;
            color: #94a3b8;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all .15s;
        }

        .btn-excluir:hover {
            background: #7f1d1d22;
            border-color: #ef4444;
            color: #f87171;
        }

        /* Estado vazio */
        .empty-state {
            grid-column: 1 / -1;
            padding: 60px 32px;
            text-align: center;
            color: #475569;
        }

        .empty-state-icon { font-size: 36px; margin-bottom: 12px; opacity: .5; }

        .empty-state p { font-size: 14px; margin-bottom: 16px; }

        /* Loading skeleton */
        .skeleton {
            background: linear-gradient(90deg, #1e293b 25%, #263348 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 8px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .toast {
            position: fixed; bottom: 20px; right: 20px;
            background: #059669; color: white;
            padding: 10px 18px; border-radius: 8px; font-size: 13px; z-index: 999;
        }

        .toast.error { background: #dc2626; }

        @media(max-width: 600px) {
            .cards-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2>🔔 Concierge</h2>
        <nav>
            <a href="/{{ hotel.slug }}/dashboard/">🏠 Dashboard</a>
            <a href="/{{ hotel.slug }}/dashboard/criar/">➕ Criar Passeio</a>
            <a class="active">📋 Gerenciar</a>
            <a href="/{{ hotel.slug }}/dashboard/reservas/">📅 Reservas</a>
            <a href="/{{ hotel.slug }}/dashboard/cambio/">💱 Câmbio</a>
            <a href="/{{ hotel.slug }}/dashboard/relatorios/">📊 Relatórios</a>
            <a href="/{{ hotel.slug }}/dashboard/configuracoes/">⚙️ Config</a>
            <hr style="border-color:#1e293b;margin:12px 0;">
            <a href="/logout/">↩ Sair</a>
        </nav>
    </aside>

    <!-- MAIN -->
    <main class="main">

        <header class="topbar">
            <div>
                <h1>📋 Gerenciar Passeios</h1>
                <p style="font-size:13px;color:#64748b;">{{ hotel.nome }}</p>
            </div>
            <a href="/{{ hotel.slug }}/dashboard/criar/" class="btn-novo">
                ➕ Novo Passeio
            </a>
        </header>

        <div class="content">

            <div class="content-header">
                <div>
                    <h2 id="titulo-lista">Todos os passeios</h2>
                    <span id="sub-lista"></span>
                </div>
            </div>

            <div class="cards-grid" id="lista">
                <!-- Skeletons enquanto carrega -->
                ${[1,2,3].map(() => `
                <div class="passeio-card">
                    <div class="card-img skeleton"></div>
                    <div class="card-body">
                        <div class="skeleton" style="height:16px;width:70%;margin-bottom:8px;"></div>
                        <div class="skeleton" style="height:12px;width:100%;margin-bottom:4px;"></div>
                        <div class="skeleton" style="height:12px;width:80%;margin-bottom:14px;"></div>
                        <div class="skeleton" style="height:34px;"></div>
                    </div>
                </div>`).join('')}
            </div>

        </div>
    </main>
</div>

<script>
window.hotelSlug = "{{ hotel.slug }}";

async function carregarPasseiosAdmin() {
    const container = document.getElementById("lista");

    try {
        const res = await fetch(`/api/${hotelSlug}/passeios/`);
        const passeios = await res.json();

        document.getElementById('sub-lista').innerText = `${passeios.length} passeio(s) cadastrado(s)`;

        if (!passeios.length) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">🗺️</div>
                    <p>Nenhum passeio cadastrado ainda.</p>
                    <a href="/${hotelSlug}/dashboard/criar/" class="btn-novo">➕ Criar primeiro passeio</a>
                </div>`;
            return;
        }

        container.innerHTML = passeios.map(p => {
            const temFoto = (p.fotos && p.fotos.length > 0) || p.banner;
            const imgSrc = p.banner || (p.fotos && p.fotos[0]?.url);

            const precoLabel = p.preco_sob_consulta
                ? 'Sob consulta'
                : `R$ ${parseFloat(p.preco || 0).toLocaleString('pt-BR', {minimumFractionDigits:2})}${p.preco_por_pessoa ? '/pax' : ''}`;

            const tags = [];
            if (p.preco_por_pessoa) tags.push(`<span class="tag tag-pax">Por pessoa</span>`);
            if (p.preco_sob_consulta) tags.push(`<span class="tag tag-consulta">Sob consulta</span>`);
            if (temFoto) tags.push(`<span class="tag tag-foto">✓ Com foto</span>`);
            else tags.push(`<span class="tag tag-sem-foto">Sem foto</span>`);

            return `
            <div class="passeio-card">
                <div class="card-img">
                    ${imgSrc
                        ? `<img src="${imgSrc}" alt="${p.nome}">`
                        : `<div class="sem-imagem"><span class="sem-imagem-icon">📷</span>Sem imagem</div>`
                    }
                    <span class="preco-badge">${precoLabel}</span>
                </div>
                <div class="card-body">
                    <div class="card-nome" title="${p.nome}">${p.nome}</div>
                    <div class="card-desc">${p.descricao || 'Sem descrição'}</div>
                    <div class="card-tags">${tags.join('')}</div>
                    <div class="card-acoes">
                        <a href="/${hotelSlug}/dashboard/criar/?id=${p.id}" class="btn-editar">
                            ✏️ Editar
                        </a>
                        <button class="btn-excluir" onclick="deletarPasseio(${p.id}, '${p.nome.replace(/'/g, "\\'")}')">
                            🗑️
                        </button>
                    </div>
                </div>
            </div>`;
        }).join('');

    } catch (error) {
        console.error(error);
        container.innerHTML = `
            <div class="empty-state">
                <div class="empty-state-icon">⚠️</div>
                <p>Erro ao carregar passeios.</p>
            </div>`;
    }
}

async function deletarPasseio(id, nome) {
    if (!confirm(`Excluir o passeio "${nome}"? Esta ação não pode ser desfeita.`)) return;

    try {
        const res = await fetch(`/api/admin/${hotelSlug}/passeios/${id}/`, { method: "DELETE" });
        if (!res.ok) throw new Error();
        mostrarToast('Passeio excluído.');
        carregarPasseiosAdmin();
    } catch (err) {
        mostrarToast('Erro ao excluir.', 'error');
    }
}

function mostrarToast(msg, tipo = '') {
    const t = document.createElement('div');
    t.className = `toast ${tipo}`;
    t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2500);
}

document.addEventListener("DOMContentLoaded", carregarPasseiosAdmin);
</script>
</body>
</html>
