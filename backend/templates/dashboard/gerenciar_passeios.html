{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Gerenciar Passeios — {{ hotel.nome }}</title>
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="layout">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-logo">🔔 Concierge</div>
            <nav>
                <a href="/{{ hotel.slug }}/dashboard/">🏠 Dashboard</a>
                <a href="/{{ hotel.slug }}/dashboard/criar/">➕ Criar Passeio</a>
                <a href="/{{ hotel.slug }}/dashboard/listar/" class="active">📋 Gerenciar</a>
                <a href="/{{ hotel.slug }}/dashboard/reservas/">📅 Reservas</a>
                <a href="/{{ hotel.slug }}/dashboard/cambio/">💱 Câmbio</a>
                <a href="/{{ hotel.slug }}/dashboard/relatorios/">📊 Relatórios</a>
                <a href="/{{ hotel.slug }}/dashboard/configuracoes/">⚙️ Config</a>
                <hr>
                <a href="/logout/">↩ Sair</a>
            </nav>
        </aside>

        <!-- MAIN -->
        <main class="main">

            <div class="topbar">
                <div>
                    <span class="topbar-title">📋 Gerenciar Passeios</span>
                    <div style="font-size:12px;color:var(--text-soft);margin-top:2px;">{{ hotel.nome }}</div>
                </div>
                <a href="/{{ hotel.slug }}/dashboard/criar/" class="btn-novo">
                    ➕ Novo Passeio
                </a>
            </div>

            <div class="content">

                <div class="content-header">
                    <div>
                        <h2 id="titulo-lista">Todos os passeios</h2>
                        <span id="sub-lista"></span>
                    </div>
                </div>

                <div class="cards-grid" id="lista">
                    <!-- skeletons enquanto carrega -->
                    <div class="passeio-card">
                        <div class="card-img skeleton"></div>
                        <div class="card-body">
                            <div class="skeleton" style="height:16px;width:70%;margin-bottom:8px;"></div>
                            <div class="skeleton" style="height:12px;width:100%;margin-bottom:4px;"></div>
                            <div class="skeleton" style="height:12px;width:80%;margin-bottom:14px;"></div>
                            <div class="skeleton" style="height:34px;"></div>
                        </div>
                    </div>
                    <div class="passeio-card">
                        <div class="card-img skeleton"></div>
                        <div class="card-body">
                            <div class="skeleton" style="height:16px;width:70%;margin-bottom:8px;"></div>
                            <div class="skeleton" style="height:12px;width:100%;margin-bottom:4px;"></div>
                            <div class="skeleton" style="height:12px;width:80%;margin-bottom:14px;"></div>
                            <div class="skeleton" style="height:34px;"></div>
                        </div>
                    </div>
                    <div class="passeio-card">
                        <div class="card-img skeleton"></div>
                        <div class="card-body">
                            <div class="skeleton" style="height:16px;width:70%;margin-bottom:8px;"></div>
                            <div class="skeleton" style="height:12px;width:100%;margin-bottom:4px;"></div>
                            <div class="skeleton" style="height:12px;width:80%;margin-bottom:14px;"></div>
                            <div class="skeleton" style="height:34px;"></div>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>
        window.hotelSlug = "{{ hotel.slug }}";

        async function carregarPasseiosAdmin() {
            const container = document.getElementById("lista");

            try {
                const res = await fetch(`/api/${hotelSlug}/passeios/`);
                const passeios = await res.json();

                document.getElementById('sub-lista').innerText =
                    `${passeios.length} passeio(s) cadastrado(s)`;

                if (!passeios.length) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">🗺️</div>
                            <p>Nenhum passeio cadastrado ainda.</p>
                            <a href="/${hotelSlug}/dashboard/criar/" class="btn-novo">➕ Criar primeiro passeio</a>
                        </div>`;
                    return;
                }

                container.innerHTML = passeios.map(p => {
                    const temFoto = (p.fotos && p.fotos.length > 0) || p.banner;
                    const imgSrc  = p.banner || (p.fotos && p.fotos[0]?.url);

                    const precoLabel = p.preco_sob_consulta
                        ? 'Sob consulta'
                        : `R$ ${parseFloat(p.preco || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}${p.preco_por_pessoa ? '/pax' : ''}`;

                    const tags = [];
                    if (p.preco_por_pessoa)   tags.push(`<span class="tag tag-pax">Por pessoa</span>`);
                    if (p.preco_sob_consulta) tags.push(`<span class="tag tag-consulta">Sob consulta</span>`);
                    if (temFoto)              tags.push(`<span class="tag tag-foto">✓ Com foto</span>`);
                    else                      tags.push(`<span class="tag tag-sem-foto">Sem foto</span>`);

                    return `
                    <div class="passeio-card">
                        <div class="card-img">
                            ${imgSrc
                                ? `<img src="${imgSrc}" alt="${p.nome}">`
                                : `<div class="sem-imagem"><span class="sem-imagem-icon">📷</span>Sem imagem</div>`
                            }
                            <span class="preco-badge">${precoLabel}</span>
                        </div>
                        <div class="card-body">
                            <div class="card-nome" title="${p.nome}">${p.nome}</div>
                            <div class="card-desc">${p.descricao || 'Sem descrição'}</div>
                            <div class="card-tags">${tags.join('')}</div>
                            <div class="card-acoes">
                                <a href="/${hotelSlug}/dashboard/criar/?id=${p.id}" class="btn-editar">
                                    ✏️ Editar
                                </a>
                                <button class="btn-excluir" onclick="deletarPasseio(${p.id}, '${p.nome.replace(/'/g, "\\'")}')">
                                    🗑️
                                </button>
                            </div>
                        </div>
                    </div>`;
                }).join('');

            } catch (error) {
                console.error(error);
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <p>Erro ao carregar passeios.</p>
                    </div>`;
            }
        }

        async function deletarPasseio(id, nome) {
            if (!confirm(`Excluir o passeio "${nome}"? Esta ação não pode ser desfeita.`)) return;
            try {
                const res = await fetch(`/api/admin/${hotelSlug}/passeios/${id}/`, { method: "DELETE" });
                if (!res.ok) throw new Error();
                mostrarToast('Passeio excluído.');
                carregarPasseiosAdmin();
            } catch {
                mostrarToast('Erro ao excluir.', 'error');
            }
        }

        function mostrarToast(msg, tipo = '') {
            const t = document.createElement('div');
            t.className = `toast ${tipo}`;
            t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        document.addEventListener("DOMContentLoaded", carregarPasseiosAdmin);
    </script>
    <script src="{% static 'js/mobile-menu.js' %}"></script>
</body>

</html>
