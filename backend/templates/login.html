{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Concierge</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="logo-icon">🔔</div>
                <h1 class="logo-text"><span>Concierge</span></h1>
            </div>

            <h2>Bem-vindo</h2>
            <p class="subtitle">Acesse o painel do seu hotel</p>

            {% if erro %}
            <div class="erro-box">
                <span class="icon">⚠️</span> {{ erro }}
            </div>
            {% endif %}

            <form method="POST" autocomplete="off">
                {% csrf_token %}
                <div class="input-group">
                    <label>Usuário</label>
                    <input type="text" name="username" placeholder="Digite seu usuário" required>
                </div>

                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-login">Entrar no Sistema</button>
            </form>
            
            <div class="login-footer">
                <p>&copy; 2026 ConciergePro Manager</p>
            </div>
        </div>
    </div>
    
</body>
</html>
