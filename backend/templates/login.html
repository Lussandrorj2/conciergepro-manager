{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Concierge</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">

    <style>
        /* 1. AS CORES TÊM QUE SER AS MESMAS (VARIÁVEIS) */
        :root {
            --bg-main: #0b0f19;
            --bg-sidebar: #0f1626;
            --bg-card: #121a2b;
            --bg-hover: #1a2438;
            --border: #1f2a40;
            --border-light: #2a3754;
            --text-main: #e6edf3;
            --text-muted: #9fb0c7;
            --text-soft: #6b7a90;
            --gold: #c9a96e;
            --primary: #22c55e;
        }

        /* 2. BASE IGUAL EM TUDO */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
        }

        /* 3. SIDEBAR PADRÃO (O MESMO DO PRINT) */
        .sidebar {
            width: 240px;
            height: 100vh;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            padding: 24px 16px;
            z-index: 1000;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 12px 30px;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
        }

        nav {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }

        nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--text-muted);
            font-size: 14px;
            text-decoration: none;
            border-radius: 10px;
            transition: .2s;
        }

        nav a:hover {
            background: var(--bg-hover);
            color: var(--text-main);
        }

        nav a.active {
            background: rgba(201, 169, 110, 0.1);
            color: var(--gold);
            font-weight: 600;
        }

        /* Ajuste para o conteúdo não ficar embaixo da sidebar */
        .main {
            margin-left: 240px;
            width: calc(100% - 240px);
        }

        /* 4. SEUS CARDS E FOTOS (MANTENDO SEU DESIGN) */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
        }
    </style>


</head>

<body>

    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="logo-icon">🔔</div>
                <h1 class="logo-text"><span>Concierge</span></h1>
            </div>

            <h2>Bem-vindo</h2>
            <p class="subtitle">Acesse o painel do seu hotel</p>

            {% if erro %}
            <div class="erro-box">
                <span class="icon">⚠️</span> {{ erro }}
            </div>
            {% endif %}

            <form method="POST" autocomplete="off">
                {% csrf_token %}
                <div class="input-group">
                    <label>Usuário</label>
                    <input type="text" name="username" placeholder="Digite seu usuário" required>
                </div>

                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-login">Entrar no Sistema</button>
            </form>

            <div class="login-footer">
                <p>&copy; 2026 ConciergePro Manager</p>
            </div>
        </div>
    </div>

</body>

</html>
